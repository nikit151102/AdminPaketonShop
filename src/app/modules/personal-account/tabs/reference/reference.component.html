<div class="container">
    <div class="counterparties-list">
        <div class="list-header">
            <h3 class="list-title">
                Справочники
            </h3>
            <span class="list-count">{{ references.length }}</span>
        </div>

        <ul class="counterparties-ul">
            <li *ngFor="let counterparty of references" 
                (click)="select(counterparty.id)"
                [class.active]="counterparty.id === selectedId">
                <div class="counterparty-item">
                    <div class="counterparty-info">
                        <span class="counterparty-name">{{ counterparty.label }}</span>
                    </div>
                </div>
            </li>
        </ul>

        <div *ngIf="references.length === 0" class="empty-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <line x1="17" y1="11" x2="23" y2="11"/>
            </svg>
            <p>Нет контрагентов</p>
        </div>
    </div>
    
    <div class="reference-content">
        <app-reference-book [typeId]="selectReference"></app-reference-book>
    </div>
</div>
