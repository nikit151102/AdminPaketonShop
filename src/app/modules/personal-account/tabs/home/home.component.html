<div class="dashboard">

  <!-- ===========================
       Верхний блок: KPI-плитки
  =========================== -->
  <div class="kpi-tiles">
    <div class="tile" *ngFor="let tile of tiles">
      <div class="tile-title">
        <!-- <div class="tile-icon" [style.background]="tile.bgColor" [innerHTML]="tile.icon"></div> -->

        <h4>{{ tile.title }}</h4>
      </div>
      <div class="tile-content">

        <p>{{ tile.value }}</p>
        <small>{{ tile.subtitle }}</small>
      </div>
    </div>
  </div>

  <!-- ===========================
       Основные карточки
  =========================== -->
  <div class="cards">
    <div class="card" *ngFor="let stat of stats">
      <div class="card-header">
        <div class="header-left">
          <!-- <span class="icon" [style.background]="stat.iconBg">{{ stat.icon }}</span> -->
          <span class="title">{{ stat.header }}</span>
        </div>
        <span class="trend" [ngClass]="stat.trend > 0 ? 'up' : 'down'">
          {{ stat.trend > 0 ? '▲' : '▼' }} {{ stat.trend }}%
        </span>
      </div>
      <div class="card-body">
        <div class="value">
          <h3>{{ stat.value }}</h3>
          <small>{{ stat.description }}</small>
        </div>

        <div class="extra-metrics">
          <div><span>Сегодня:</span> <strong>{{ stat.today }}</strong></div>
          <div><span>Вчера:</span> <strong>{{ stat.yesterday }}</strong></div>
          <div><span>Среднее:</span> <strong>{{ stat.avg }}</strong></div>
        </div>

        <div class="progress-container" *ngIf="stat.goal">
          <div class="progress-bar" [style.width.%]="stat.progress"></div>
          <small>{{ stat.progress }}% к цели {{ stat.goal }}</small>
        </div>

        <canvas *ngIf="stat.sparklineData" baseChart [data]="{
            labels: stat.sparklineLabels,
            datasets: [{ data: stat.sparklineData, borderColor: '#6A82FB', backgroundColor: 'transparent', tension: 0.4 }]
          }" [options]="sparklineOptions" [type]="'line'">
        </canvas>
      </div>
    </div>
  </div>

  <!-- ===========================
       Графики
  =========================== -->
  <div class="charts">
    <div class="chart-card">
      <canvas baseChart
        [data]="{ labels: orderStatsLabels, datasets: [{ data: orderStatsData, label: 'Orders', borderColor: '#8E54E9', backgroundColor: 'transparent' }] }"
        [options]="chartOptions" [type]="'line'">
      </canvas>
    </div>
    <div class="chart-card" style="max-width: 29%;">
      <canvas baseChart
        [data]="{ labels: productStatsLabels, datasets: [{ data: productStatsData, label: 'Products', backgroundColor: ['#42A5F5','#66BB6A','#FFA726','#FF6384','#36A2EB'] }] }"
        [options]="chartOptions" [type]="'doughnut'">
      </canvas>
    </div>
  </div>

</div>
