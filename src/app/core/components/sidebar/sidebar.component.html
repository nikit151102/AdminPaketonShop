<div class="sidebar" [class.collapsed]="isCollapsed">
  <div class="sidebar-header">
    <button class="collapse-btn" (click)="toggleCollapse()" aria-label="Toggle sidebar">
      <svg viewBox="0 0 24 24" width="24" height="24">
        <path d="M6 6l12 6-12 6z" fill="currentColor"></path>
      </svg>
    </button>
    <span *ngIf="!isCollapsed" class="brand">AdminPanel</span>
  </div>

  <nav class="menu">
    <button
      *ngFor="let item of menu"
      class="menu-item"
      [class.active]="item.active"
    >
      <span class="icon" [innerHTML]="item.icon"></span>
      <span class="label" *ngIf="!isCollapsed">{{ item.label }}</span>
      <span *ngIf="item.badge && !isCollapsed" class="badge">{{ item.badge }}</span>
    </button>
  </nav>
</div>
