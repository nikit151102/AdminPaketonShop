<div class="sidebar" [class.collapsed]="isCollapsed">
  <div class="sidebar-header">
    <span *ngIf="!isCollapsed" class="brand"><img src="logo.png" alt=""></span>
  </div>

  <nav class="menu">
    <button *ngFor="let item of menu" class="menu-item" [routerLink]="item.router" routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }">
      <span class="icon" [innerHTML]="item.icon"></span>
      <span class="label" *ngIf="!isCollapsed">{{ item.label }}</span>
      <span *ngIf="item.badge && !isCollapsed" class="badge">{{ item.badge }}</span>
    </button>
  </nav>
</div>
